<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dad Joke Generator 😂</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #fff9c4;
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 40px,
        rgba(255, 220, 0, 0.15) 40px,
        rgba(255, 220, 0, 0.15) 80px
      );
    }

    h1 {
      font-family: 'Bangers', cursive;
      font-size: 4rem;
      color: #222;
      letter-spacing: 3px;
      text-shadow: 4px 4px 0px #f9a825;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      font-size: 1rem;
      color: #555;
      margin-bottom: 40px;
      font-weight: 700;
      text-align: center;
    }

    .card {
      background: white;
      border: 4px solid #222;
      border-radius: 20px;
      box-shadow: 8px 8px 0px #222;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
    }

    #joke-text {
      font-size: 1.4rem;
      color: #222;
      line-height: 1.6;
      font-weight: 700;
    }

    button {
      font-family: 'Bangers', cursive;
      font-size: 1.6rem;
      letter-spacing: 2px;
      background-color: #f9a825;
      color: #222;
      border: 4px solid #222;
      border-radius: 14px;
      padding: 14px 40px;
      cursor: pointer;
      box-shadow: 5px 5px 0px #222;
    }
  </style>
</head>
<body>

  <h1>Dad Joke Generator</h1>
  <p class="subtitle">Warning: These jokes are extremely punny 🥁</p>

  <div class="card">
    <p id="joke-text">Click the button to get a joke!</p>
  </div>

  <button id="joke-btn">Get a Joke!</button>

  <script>

    // STEP 1: Grab the HTML elements so JavaScript can control them
    // Fill in the two IDs in quotes — look at the HTML above to find them!

    const jokeText = document.getElementById("_________");  // BLANK A
    const jokeBtn  = document.getElementById("_________");  // BLANK B


    // STEP 2: Create a function that fetches a joke
    // The word "async" means this function is allowed to wait for things (like the internet)

    async function getDadJoke() {

      // STEP 3: While we wait for the joke, show a loading message
      // Fill in what text should appear while loading

      jokeText.textContent = "_________";  // BLANK C
      jokeText.classList.add("loading");

      // STEP 4: Call the API (this is where the magic happens!)
      // We use try/catch in case something goes wrong (like no internet)

      try {
        const response = await fetch("https://icanhazdadjoke.com/", {
          headers: {
            Accept: "application/json"
          }
        });

        // STEP 5: Turn the response into a JavaScript object we can use
        const data = await response._________();  // BLANK D


        // STEP 6: Display the joke on the page!
        // The joke lives at data.joke — put it into jokeText

        jokeText.textContent = data._________;  // BLANK E
        jokeText.classList.remove("loading");

      } catch (error) {
        jokeText.textContent = "Uh oh! Couldn't fetch a joke. Check your internet!";
        jokeText.classList.add("error");
      }
    }


    // STEP 7: Make the button actually DO something when clicked
    // Connect the button to the function we wrote above

    jokeBtn.addEventListener("_________", getDadJoke);  // BLANK F


  </script>

</body>
</html>
